<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thunderbird Bass Fretboard</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Thunderbird Bass Fretboard</h1>
        <div class="controls">
          <div class="control-group">
            <label for="root-select">Root Note</label>
            <select id="root-select">
              <option value="C">C</option>
              <option value="C#">C#</option>
              <option value="D">D</option>
              <option value="Eb">Eb</option>
              <option value="E">E</option>
              <option value="F">F</option>
              <option value="F#">F#</option>
              <option value="G">G</option>
              <option value="Ab">Ab</option>
              <option value="A" selected>A</option>
              <option value="Bb">Bb</option>
              <option value="B">B</option>
            </select>
          </div>
          
          <div class="control-group">
            <label for="scale-select">Scale</label>
            <select id="scale-select">
              <option value="Major">Major</option>
              <option value="Minor" selected>Minor</option>
              <option value="Harmonic Minor">Harmonic Minor</option>
              <option value="Melodic Minor">Melodic Minor</option>
              <option value="Pentatonic Major">Pentatonic Major</option>
              <option value="Pentatonic Minor">Pentatonic Minor</option>
              <option value="Blues">Blues</option>
            </select>
        </div>
      </header>

      <main>
        <div class="fretboard-wrapper">
          <div class="fretboard-container" id="fretboard">
            <!-- Frets and strings generated by JS -->
          </div>
        </div>

        <section class="legend" id="legend">
          <!-- Legend generated by JS -->
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
